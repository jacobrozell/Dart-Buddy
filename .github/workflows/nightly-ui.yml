name: Nightly UI Tests

on:
  schedule:
    # 1:00 AM Eastern (05:00 UTC during EDT; 06:00 UTC during EST)
    - cron: '0 5 * * *'
  workflow_dispatch:

concurrency:
  group: nightly-ui
  cancel-in-progress: false

env:
  CI_XCODE_PROJECT: DartBuddy.xcodeproj
  CI_XCODE_SCHEME: DartBuddy
  CI_PARALLEL_TESTING: NO
  CI_PACKAGES_ROOT: .packages
  SIM_DESTINATION: platform=iOS Simulator,name=iPhone 17

jobs:
  ui-tests:
    name: UI Tests
    runs-on: macos-26
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Select Xcode 26.2
        uses: maxim-lobanov/setup-xcode@60606e260d2fc5762a71e64e74b2174e8ea3c8bd # v1.6.0
        with:
          xcode-version: '26.2'

      - name: Prepare Firebase config
        run: cp Resources/GoogleService-Info.plist.example Resources/GoogleService-Info.plist

      - name: Install CI tools
        run: brew install xcodegen xcbeautify

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Restore SPM Cache
        id: spm-cache
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        with:
          path: .packages
          key: ${{ runner.os }}-spm-${{ hashFiles('project.yml', '**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Resolve Package Dependencies
        if: steps.spm-cache.outputs.cache-hit != 'true'
        run: |
          echo "::group::Resolving SPM dependencies (cache miss)"
          xcodebuild -resolvePackageDependencies \
            -project "${{ env.CI_XCODE_PROJECT }}" \
            -scheme "${{ env.CI_XCODE_SCHEME }}" \
            -clonedSourcePackagesDirPath ./.packages/cloned_sources \
            -packageCachePath "$(pwd)/.packages/cache"
          echo "::endgroup::"

      - name: Build for Testing
        run: |
          echo "::group::Building for Testing"
          set -o pipefail
          xcodebuild build-for-testing \
            -project "${{ env.CI_XCODE_PROJECT }}" \
            -scheme "${{ env.CI_XCODE_SCHEME }}" \
            -destination "${{ env.SIM_DESTINATION }}" \
            -derivedDataPath DerivedData \
            -clonedSourcePackagesDirPath ./.packages/cloned_sources \
            -packageCachePath "$(pwd)/.packages/cache" \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee xcodebuild-build.log | xcbeautify --renderer github-actions
          echo "::endgroup::"

      - name: Run UI Tests
        run: Scripts/ci/run-tests.sh "${{ env.SIM_DESTINATION }}"

      - name: Dump Logs on Failure
        if: failure()
        run: |
          echo "::group::Raw xcodebuild build log (tail)"
          if [ -f xcodebuild-build.log ]; then tail -200 xcodebuild-build.log; fi
          echo "::endgroup::"
          echo "::group::Raw xcodebuild test log (tail)"
          if [ -f xcodebuild-test.log ]; then tail -300 xcodebuild-test.log; fi
          echo "::endgroup::"

      - name: Upload Test Results
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        if: always()
        with:
          name: nightly-ui-test-results
          path: |
            TestResults.xcresult
            xcodebuild-test.log
            xcodebuild-build.log
          retention-days: 7
          if-no-files-found: ignore

  notify:
    name: Notify Slack
    runs-on: ubuntu-latest
    needs: [ui-tests]
    if: always()
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Post nightly UI result
        uses: ./.github/actions/slack-ci-notify
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        with:
          workflow_title: Nightly UI Tests
          jobs_json: '{"UI Tests":"${{ needs.ui-tests.result }}"}'
