name: Nightly UI Tests

on:
  schedule:
    # 1:00 AM Eastern (05:00 UTC during EDT; 06:00 UTC during EST)
    - cron: '0 5 * * *'
  workflow_dispatch:

concurrency:
  group: nightly-ui-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  CI_XCODE_PROJECT: DartBuddy.xcodeproj
  CI_PARALLEL_TESTING: YES
  CI_PACKAGES_ROOT: .packages
  # Pro Max reports regular horizontal size class in landscape (Plus/Max class iPhones).
  SIM_DESTINATION_PRO_MAX: platform=iOS Simulator,name=iPhone 17 Pro Max
  SIM_DESTINATION_STANDARD: platform=iOS Simulator,name=iPhone 17

jobs:
  ui-suite:
    name: ${{ matrix.suite }}
    runs-on: macos-26
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - suite: UI Smoke
            scheme: DartBuddyUISmoke
            destination: SIM_DESTINATION_STANDARD
          - suite: UI Gameplay
            scheme: DartBuddyUIGameplay
            destination: SIM_DESTINATION_STANDARD
          - suite: UI Accessibility
            scheme: DartBuddyUIAccessibility
            destination: SIM_DESTINATION_STANDARD
          - suite: UI Localization
            scheme: DartBuddyUILocalization
            destination: SIM_DESTINATION_STANDARD
          - suite: UI Landscape
            scheme: DartBuddyUILandscape
            destination: SIM_DESTINATION_PRO_MAX
          - suite: UI Chrome
            scheme: DartBuddyUIChrome
            destination: SIM_DESTINATION_STANDARD

    env:
      CI_XCODE_SCHEME: ${{ matrix.scheme }}

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Select Xcode 26.2
        uses: maxim-lobanov/setup-xcode@60606e260d2fc5762a71e64e74b2174e8ea3c8bd # v1.6.0
        with:
          xcode-version: '26.2'

      - name: Prepare Firebase config
        run: cp Resources/GoogleService-Info.plist.example Resources/GoogleService-Info.plist

      - name: Install CI tools
        run: brew install xcodegen xcbeautify

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Restore SPM Cache
        id: spm-cache
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        with:
          path: .packages
          key: ${{ runner.os }}-spm-${{ hashFiles('project.yml', '**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Resolve Package Dependencies
        if: steps.spm-cache.outputs.cache-hit != 'true'
        run: |
          echo "::group::Resolving SPM dependencies (cache miss)"
          xcodebuild -resolvePackageDependencies \
            -project "${{ env.CI_XCODE_PROJECT }}" \
            -scheme "${{ env.CI_XCODE_SCHEME }}" \
            -clonedSourcePackagesDirPath ./.packages/cloned_sources \
            -packageCachePath "$(pwd)/.packages/cache"
          echo "::endgroup::"

      - name: Build for Testing
        run: |
          echo "::group::Building for Testing (${{ matrix.scheme }})"
          set -o pipefail
          xcodebuild build-for-testing \
            -project "${{ env.CI_XCODE_PROJECT }}" \
            -scheme "${{ env.CI_XCODE_SCHEME }}" \
            -destination "${{ env[matrix.destination] }}" \
            -derivedDataPath DerivedData \
            -clonedSourcePackagesDirPath ./.packages/cloned_sources \
            -packageCachePath "$(pwd)/.packages/cache" \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee "xcodebuild-build-${{ matrix.scheme }}.log" | xcbeautify --renderer github-actions
          echo "::endgroup::"

      - name: Run UI Tests
        run: Scripts/ci/run-tests.sh "${{ env[matrix.destination] }}"

      - name: Upload Test Results
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        if: always()
        with:
          name: nightly-${{ matrix.scheme }}-results
          path: |
            TestResults.xcresult
            xcodebuild-test.log
            xcodebuild-build-${{ matrix.scheme }}.log
          retention-days: 7
          if-no-files-found: ignore

  ui-lean:
    name: UI Lean (release branches)
    runs-on: macos-26
    timeout-minutes: 30
    if: startsWith(github.ref, 'refs/heads/release/')
    env:
      CI_XCODE_SCHEME: DartBuddyUILean
      CI_PARALLEL_TESTING: YES

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Select Xcode 26.2
        uses: maxim-lobanov/setup-xcode@60606e260d2fc5762a71e64e74b2174e8ea3c8bd # v1.6.0
        with:
          xcode-version: '26.2'

      - name: Prepare Firebase config
        run: cp Resources/GoogleService-Info.plist.example Resources/GoogleService-Info.plist

      - name: Install CI tools
        run: brew install xcodegen xcbeautify

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build for Testing
        run: |
          set -o pipefail
          xcodebuild build-for-testing \
            -project DartBuddy.xcodeproj \
            -scheme DartBuddyUILean \
            -destination "platform=iOS Simulator,name=iPhone 17" \
            -derivedDataPath DerivedData \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Run Lean UI Tests
        run: Scripts/ci/run-tests.sh "platform=iOS Simulator,name=iPhone 17"

  documentation:
    name: Documentation Summary
    runs-on: macos-26
    needs: [ui-suite]
    if: always()
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Documentation Summary
        run: Scripts/ci/documentation-summary.sh | tee documentation-summary.txt

      - name: Upload documentation artifact
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: nightly-documentation-summary
          path: documentation-summary.txt
          retention-days: 7

  notify:
    name: Notify Slack
    runs-on: ubuntu-latest
    needs: [ui-suite, ui-lean]
    if: always()
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Prepare Slack artifacts directory
        run: mkdir -p notify-artifacts

      - name: Prepare Slack context
        run: |
          Scripts/ci/prepare-slack-context.sh notify-artifacts/slack-context.json \
            || echo '{}' > notify-artifacts/slack-context.json
        env:
          ARTIFACTS_DIR: notify-artifacts

      - name: Post nightly UI result
        uses: ./.github/actions/slack-ci-notify
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_NIGHTLY || secrets.SLACK_WEBHOOK_URL }}
        with:
          workflow_title: Nightly UI Tests
          workflow_kind: nightly
          jobs_json: '{"UI Suites":"${{ needs.ui-suite.result }}","UI Lean":"${{ needs.ui-lean.result }}"}'
          context_file: notify-artifacts/slack-context.json
