name: CI

on:
  push:
    branches: [master, main, dev, 'release/**']
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

env:
  CI_XCODE_PROJECT: DartBuddy.xcodeproj
  CI_XCODE_SCHEME: DartBuddyCI
  # Parallel testing spawns multiple simulator clones; one clone intermittently
  # crashes ("TEST EXECUTE FAILED", every test reported at 0.000s) and fails the
  # whole job even though the suite is green. The unit/accessibility suite runs in
  # ~3 min sequentially, so disable parallelism for deterministic CI runs.
  CI_PARALLEL_TESTING: NO
  CI_PACKAGES_ROOT: .packages
  SIM_DESTINATION: platform=iOS Simulator,name=iPhone 17

jobs:
  firebase-parity:
    name: Firebase iOS/Android parity
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout iOS
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Checkout Android
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: jacobrozell/DartBuddy-Android
          path: DartBuddy-Android

      - name: Verify Firebase telemetry parity
        run: DartBuddy-Android/scripts/check-firebase-parity.sh

  lint:
    name: SwiftLint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    container:
      image: ghcr.io/realm/swiftlint:0.57.1

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Lint
        run: swiftlint lint --reporter github-actions-logging

      - name: Block Firebase plist secrets
        run: |
          tracked=$(git ls-files '**/GoogleService-Info.plist' | grep -v '\.example$' || true)
          if [ -n "$tracked" ]; then
            echo "::error::Tracked GoogleService-Info.plist must stay gitignored: $tracked"
            exit 1
          fi

  build:
    name: Build for Testing
    runs-on: macos-26
    needs: firebase-parity
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Select Xcode 26.2
        uses: maxim-lobanov/setup-xcode@60606e260d2fc5762a71e64e74b2174e8ea3c8bd # v1.6.0
        with:
          xcode-version: '26.2'

      - name: Prepare Firebase config
        run: cp Resources/GoogleService-Info.plist.example Resources/GoogleService-Info.plist

      - name: Install CI tools
        run: brew install xcodegen xcbeautify

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Restore SPM Cache
        id: spm-cache
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        with:
          path: .packages
          key: ${{ runner.os }}-spm-${{ hashFiles('project.yml', '**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Resolve Package Dependencies
        if: steps.spm-cache.outputs.cache-hit != 'true'
        run: |
          echo "::group::Resolving SPM dependencies (cache miss)"
          xcodebuild -resolvePackageDependencies \
            -project "${{ env.CI_XCODE_PROJECT }}" \
            -scheme "${{ env.CI_XCODE_SCHEME }}" \
            -clonedSourcePackagesDirPath ./.packages/cloned_sources \
            -packageCachePath "$(pwd)/.packages/cache"
          echo "::endgroup::"

      - name: Build for Testing
        run: |
          echo "::group::Building for Testing"
          set -o pipefail
          xcodebuild build-for-testing \
            -project "${{ env.CI_XCODE_PROJECT }}" \
            -scheme "${{ env.CI_XCODE_SCHEME }}" \
            -destination "${{ env.SIM_DESTINATION }}" \
            -derivedDataPath DerivedData \
            -clonedSourcePackagesDirPath ./.packages/cloned_sources \
            -packageCachePath "$(pwd)/.packages/cache" \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee xcodebuild-build.log | xcbeautify --renderer github-actions
          echo "::endgroup::"

      - name: Dump Build Log on Failure
        if: failure()
        run: |
          echo "::group::Raw xcodebuild build log (tail)"
          if [ -f xcodebuild-build.log ]; then
            tail -200 xcodebuild-build.log
          else
            echo "xcodebuild-build.log not present."
          fi
          echo "::endgroup::"

      - name: Upload Build Log on Failure
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        if: failure()
        with:
          name: build-log
          path: xcodebuild-build.log
          retention-days: 1
          if-no-files-found: ignore

      - name: Upload Test Products
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: test-products
          path: |
            DartBuddy.xcodeproj
            DerivedData/Build/Products
          retention-days: 1

  release-build:
    name: Release Build (whole-module)
    runs-on: macos-26
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Select Xcode 26.2
        uses: maxim-lobanov/setup-xcode@60606e260d2fc5762a71e64e74b2174e8ea3c8bd # v1.6.0
        with:
          xcode-version: '26.2'

      - name: Prepare Firebase config
        run: cp Resources/GoogleService-Info.plist.example Resources/GoogleService-Info.plist

      - name: Install CI tools
        run: brew install xcodegen xcbeautify

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Restore SPM Cache
        id: spm-cache
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        with:
          path: .packages
          key: ${{ runner.os }}-spm-${{ hashFiles('project.yml', '**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Resolve Package Dependencies
        if: steps.spm-cache.outputs.cache-hit != 'true'
        run: |
          xcodebuild -resolvePackageDependencies \
            -project "${{ env.CI_XCODE_PROJECT }}" \
            -scheme DartBuddy \
            -clonedSourcePackagesDirPath ./.packages/cloned_sources \
            -packageCachePath "$(pwd)/.packages/cache"

      - name: Release Build
        run: |
          set -o pipefail
          xcodebuild build \
            -project "${{ env.CI_XCODE_PROJECT }}" \
            -scheme DartBuddy \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath DerivedData \
            -clonedSourcePackagesDirPath ./.packages/cloned_sources \
            -packageCachePath "$(pwd)/.packages/cache" \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee xcodebuild-release.log | xcbeautify --renderer github-actions

      - name: Upload Release Build Log on Failure
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        if: failure()
        with:
          name: release-build-log
          path: xcodebuild-release.log
          retention-days: 1
          if-no-files-found: ignore

  test:
    name: Test
    runs-on: macos-26
    needs: build
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Select Xcode 26.2
        uses: maxim-lobanov/setup-xcode@60606e260d2fc5762a71e64e74b2174e8ea3c8bd # v1.6.0
        with:
          xcode-version: '26.2'

      - name: Prepare Firebase config
        run: cp Resources/GoogleService-Info.plist.example Resources/GoogleService-Info.plist

      - name: Restore SPM Cache
        id: spm-cache
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        with:
          path: .packages
          key: ${{ runner.os }}-spm-${{ hashFiles('project.yml', '**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Download Test Products
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: test-products
          path: .

      - name: Resolve Package Dependencies
        if: steps.spm-cache.outputs.cache-hit != 'true'
        run: |
          echo "::group::Resolving SPM dependencies (cache miss)"
          xcodebuild -resolvePackageDependencies \
            -project "${{ env.CI_XCODE_PROJECT }}" \
            -scheme "${{ env.CI_XCODE_SCHEME }}" \
            -clonedSourcePackagesDirPath ./.packages/cloned_sources \
            -packageCachePath "$(pwd)/.packages/cache"
          echo "::endgroup::"

      - name: Install xcbeautify
        run: brew install xcbeautify

      - name: Run Tests
        run: Scripts/ci/run-tests.sh "${{ env.SIM_DESTINATION }}"

      - name: Coverage Summary
        if: always()
        run: Scripts/ci/coverage-summary.sh

      - name: Documentation Summary
        if: always()
        run: Scripts/ci/documentation-summary.sh

      - name: Dump Test Log on Failure
        if: failure()
        run: |
          echo "::group::Raw xcodebuild test log (tail)"
          if [ -f xcodebuild-test.log ]; then
            tail -300 xcodebuild-test.log
          else
            echo "xcodebuild-test.log not present."
          fi
          echo "::endgroup::"

      - name: Upload Test Results
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        if: always()
        with:
          name: test-results
          path: |
            TestResults.xcresult
            coverage-summary.txt
            documentation-summary.txt
            xcodebuild-test.log
          if-no-files-found: ignore

  notify:
    name: Notify Slack
    runs-on: ubuntu-latest
    needs: [build, test]
    if: always()
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Prepare Slack artifacts directory
        run: mkdir -p notify-artifacts

      - name: Download test results
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        continue-on-error: true
        with:
          name: test-results
          path: notify-artifacts

      - name: Download build log
        if: needs.build.result == 'failure'
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        continue-on-error: true
        with:
          name: build-log
          path: notify-artifacts

      - name: Prepare Slack context
        run: |
          Scripts/ci/prepare-slack-context.sh notify-artifacts/slack-context.json \
            || echo '{}' > notify-artifacts/slack-context.json
        env:
          ARTIFACTS_DIR: notify-artifacts

      - name: Post CI result
        uses: ./.github/actions/slack-ci-notify
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_CI || secrets.SLACK_WEBHOOK_URL }}
        with:
          workflow_title: CI
          workflow_kind: ci
          jobs_json: '{"Build for Testing":"${{ needs.build.result }}","Test":"${{ needs.test.result }}"}'
          context_file: notify-artifacts/slack-context.json
