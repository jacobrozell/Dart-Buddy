name: DartBuddy
attributes:
  ORGANIZATIONNAME: Jacob Rozell
packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: 11.0.0
options:
  minimumXcodeGenVersion: 2.44.0
  developmentLanguage: en
  bundleIdPrefix: com.jacobrozell
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    SWIFT_VERSION: 5.10
    DEVELOPMENT_TEAM: 7JT2JB89AV
    CODE_SIGN_STYLE: Automatic
targets:
  DartBuddy:
    type: application
    platform: iOS
    sources:
      - path: App
        excludes:
          - "**/README.md"
      - path: Data
        excludes:
          - "**/README.md"
      - path: DesignSystem
        excludes:
          - "**/README.md"
      - path: Domain
        excludes:
          - "**/README.md"
      - path: Features
        excludes:
          - "**/README.md"
      - path: Persistence
        excludes:
          - "**/README.md"
      - path: Support
        excludes:
          - "**/README.md"
      - path: Intents
        excludes:
          - "**/README.md"
      - path: Resources/Media.xcassets
      - path: Resources/en.lproj/Localizable.strings
        type: file
        buildPhase: resources
      - path: Resources/en.lproj/GameplayModes.strings
        type: file
        buildPhase: resources
      - path: Resources/de.lproj/Localizable.strings
        type: file
        buildPhase: resources
      - path: Resources/de.lproj/GameplayModes.strings
        type: file
        buildPhase: resources
      - path: Resources/es.lproj/Localizable.strings
        type: file
        buildPhase: resources
      - path: Resources/es.lproj/GameplayModes.strings
        type: file
        buildPhase: resources
      - path: Resources/nl.lproj/Localizable.strings
        type: file
        buildPhase: resources
      - path: Resources/nl.lproj/GameplayModes.strings
        type: file
        buildPhase: resources
      - path: Resources/fr.lproj/Localizable.strings
        type: file
        buildPhase: resources
      - path: Resources/fr.lproj/GameplayModes.strings
        type: file
        buildPhase: resources
      - path: Resources/zh-Hans.lproj/Localizable.strings
        type: file
        buildPhase: resources
      - path: Resources/zh-Hans.lproj/GameplayModes.strings
        type: file
        buildPhase: resources
      - path: Resources/it.lproj/Localizable.strings
        type: file
        buildPhase: resources
      - path: Resources/it.lproj/GameplayModes.strings
        type: file
        buildPhase: resources
      - path: Resources/GoogleService-Info.plist
        type: file
        buildPhase: resources
    dependencies:
      - package: Firebase
        product: FirebaseCore
      - package: Firebase
        product: FirebaseAnalytics
      - package: Firebase
        product: FirebaseCrashlytics
      - sdk: AppIntents.framework
    postBuildScripts:
      - name: Firebase Crashlytics
        script: |
          if [ "${CONFIGURATION}" != "Release" ]; then
            exit 0
          fi
          if ! [ -f "${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/GoogleService-Info.plist" ]; then
            exit 0
          fi
          if grep -q "REPLACE_WITH" "${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/GoogleService-Info.plist" 2>/dev/null; then
            exit 0
          fi
          RUN_SCRIPT="${BUILD_DIR%/Build/*}/SourcePackages/checkouts/firebase-ios-sdk/Crashlytics/run"
          if [ ! -f "$RUN_SCRIPT" ]; then
            echo "warning: Crashlytics run script not found at $RUN_SCRIPT"
            exit 0
          fi
          "$RUN_SCRIPT"
        inputFileLists:
          - Scripts/FirebaseCrashlyticsInputFiles.xcfilelist
        basedOnDependencyAnalysis: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jacobrozell.DartBuddy
        PRODUCT_NAME: DartBuddy
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Dart Buddy
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.sports
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        INFOPLIST_KEY_UILaunchScreen_Generation: NO
        INFOPLIST_KEY_UILaunchStoryboardName: LaunchScreen
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        # Camera auto-scoring (flag `enableVisionAutoScoring`, specs/AutoScoringVisionSpec.md).
        INFOPLIST_KEY_NSCameraUsageDescription: Dart Buddy uses the camera to detect darts on the board and score throws automatically.
        INFOPLIST_KEY_UIRequiresFullScreen: NO
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        CURRENT_PROJECT_VERSION: 8
        MARKETING_VERSION: 1.1.0
    info:
      path: App/DartBuddy-Info.plist
      properties:
        CFBundleLocalizations:
          - en
          - de
          - es
          - nl
          - fr
          - zh-Hans
          - it
        CFBundleURLTypes:
          - CFBundleURLName: com.jacobrozell.DartBuddy.deeplink
            CFBundleURLSchemes:
              - dartbuddy
    scheme:
      testTargets:
        - DartBuddyTests
        - DartBuddyUISmokeUITests
        - DartBuddyUIGameplayUITests
        - DartBuddyUIAccessibilityUITests
        - DartBuddyUILocalizationUITests
        - DartBuddyUILandscapeUITests
        - DartBuddyUIChromeUITests
        - DartBuddyUILeanUITests
      commandLineArguments:
        "-enable_achievements": true
  DartBuddyTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/Unit
      - path: Tests/Accessibility
      - path: Tests/TestTags.swift
    dependencies:
      - target: DartBuddy
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
  DartBuddyPerformanceTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/Performance
      - path: Tests/TestTags.swift
    dependencies:
      - target: DartBuddy
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.jacobrozell.DartBuddyPerformanceTests
  DartBuddyUISmokeUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: Tests/UI/Support
      - path: Tests/UI/MatchSetupUITests.swift
        type: file
      - path: Tests/UI/ModesAndActivityUITests.swift
        type: file
      - path: Tests/UI/MatchChromeUITests.swift
        type: file
      - path: Tests/UI/TabNavigationUITests.swift
        type: file
    dependencies:
      - target: DartBuddy
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: DartBuddy
        PRODUCT_BUNDLE_IDENTIFIER: com.jacobrozell.DartBuddyUISmokeTests
  DartBuddyUIGameplayUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: Tests/UI/Support
      - path: Tests/UI/X01MatchUITests.swift
        type: file
      - path: Tests/UI/CricketMatchUITests.swift
        type: file
      - path: Tests/UI/GameModeScreenshotUITests.swift
        type: file
      - path: Tests/UI/MatchForfeitUITests.swift
        type: file
    dependencies:
      - target: DartBuddy
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: DartBuddy
        PRODUCT_BUNDLE_IDENTIFIER: com.jacobrozell.DartBuddyUIGameplayTests
  DartBuddyUIAccessibilityUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: Tests/UI/Support
      - path: Tests/UI/WCAGAccessibilityUITests.swift
        type: file
    dependencies:
      - target: DartBuddy
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: DartBuddy
        PRODUCT_BUNDLE_IDENTIFIER: com.jacobrozell.DartBuddyUIAccessibilityTests
  DartBuddyUILocalizationUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: Tests/UI/Support
      - path: Tests/UI/FrenchLocalizationSmokeUITests.swift
        type: file
      - path: Tests/UI/GermanLocalizationSmokeUITests.swift
        type: file
      - path: Tests/UI/SpanishLocalizationSmokeUITests.swift
        type: file
      - path: Tests/UI/DutchLocalizationSmokeUITests.swift
        type: file
      - path: Tests/UI/ChineseLocalizationSmokeUITests.swift
        type: file
      - path: Tests/UI/ItalianLocalizationSmokeUITests.swift
        type: file
    dependencies:
      - target: DartBuddy
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: DartBuddy
        PRODUCT_BUNDLE_IDENTIFIER: com.jacobrozell.DartBuddyUILocalizationTests
  DartBuddyUILandscapeUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: Tests/UI/Support
      - path: Tests/UI/RegressionUITests.swift
        type: file
    dependencies:
      - target: DartBuddy
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: DartBuddy
        PRODUCT_BUNDLE_IDENTIFIER: com.jacobrozell.DartBuddyUILandscapeTests
  DartBuddyUIChromeUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: Tests/UI/Support
      - path: Tests/UI/SettingsUITests.swift
        type: file
      - path: Tests/UI/OnboardingUITests.swift
        type: file
      - path: Tests/UI/PlayerDetailUITests.swift
        type: file
      - path: Tests/UI/BotDetailUITests.swift
        type: file
      - path: Tests/UI/HistoryDetailUITests.swift
        type: file
      - path: Tests/UI/AppStoreUpdateUITests.swift
        type: file
    dependencies:
      - target: DartBuddy
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: DartBuddy
        PRODUCT_BUNDLE_IDENTIFIER: com.jacobrozell.DartBuddyUIChromeTests
  DartBuddyUILeanUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: Tests/UI/Support
      - path: Tests/UI/PartyPack1_1SmokeUITests.swift
        type: file
    dependencies:
      - target: DartBuddy
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: DartBuddy
        PRODUCT_BUNDLE_IDENTIFIER: com.jacobrozell.DartBuddyUILeanTests
schemes:
  DartBuddyCI:
    build:
      targets:
        DartBuddy: all
    test:
      gatherCoverageData: true
      coverageTargets:
        - DartBuddy
      targets:
        - DartBuddyTests
      commandLineArguments:
        "-enable_lean_product_surface": true
    run:
      config: Debug
  DartBuddyUISmoke:
    build:
      targets:
        DartBuddy: all
    test:
      targets:
        - name: DartBuddyUISmokeUITests
          parallelizable: true
    run:
      config: Debug
  DartBuddyUIGameplay:
    build:
      targets:
        DartBuddy: all
    test:
      targets:
        - name: DartBuddyUIGameplayUITests
          parallelizable: true
    run:
      config: Debug
  DartBuddyUIAccessibility:
    build:
      targets:
        DartBuddy: all
    test:
      targets:
        - name: DartBuddyUIAccessibilityUITests
          parallelizable: true
    run:
      config: Debug
  DartBuddyUILocalization:
    build:
      targets:
        DartBuddy: all
    test:
      targets:
        - name: DartBuddyUILocalizationUITests
          parallelizable: true
    run:
      config: Debug
  DartBuddyUILandscape:
    build:
      targets:
        DartBuddy: all
    test:
      targets:
        - name: DartBuddyUILandscapeUITests
          parallelizable: true
    run:
      config: Debug
  DartBuddyUIChrome:
    build:
      targets:
        DartBuddy: all
    test:
      targets:
        - name: DartBuddyUIChromeUITests
          parallelizable: true
    run:
      config: Debug
  DartBuddyUILean:
    build:
      targets:
        DartBuddy: all
    test:
      targets:
        - name: DartBuddyUILeanUITests
          parallelizable: true
    run:
      config: Debug
  DartBuddyUI:
    build:
      targets:
        DartBuddy: all
    test:
      gatherCoverageData: true
      coverageTargets:
        - DartBuddy
      targets:
        - name: DartBuddyUISmokeUITests
          parallelizable: true
        - name: DartBuddyUIGameplayUITests
          parallelizable: true
        - name: DartBuddyUIAccessibilityUITests
          parallelizable: true
        - name: DartBuddyUILocalizationUITests
          parallelizable: true
        - name: DartBuddyUILandscapeUITests
          parallelizable: true
        - name: DartBuddyUIChromeUITests
          parallelizable: true
    run:
      config: Debug
