name: DartsScoreboard
attributes:
  ORGANIZATIONNAME: Jacob Rozell
packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: 11.0.0
options:
  minimumXcodeGenVersion: 2.44.0
  bundleIdPrefix: com.jacobrozell
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    SWIFT_VERSION: 5.10
    DEVELOPMENT_TEAM: 7JT2JB89AV
    CODE_SIGN_STYLE: Automatic
targets:
  DartsScoreboard:
    type: application
    platform: iOS
    sources:
      - path: App
      - path: Data
      - path: DesignSystem
      - path: Domain
      - path: Features
      - path: Persistence
      - path: Support
      - path: Media.xcassets
      - path: en.lproj/Localizable.strings
        type: file
        buildPhase: resources
      - path: GoogleService-Info.plist
        type: file
        buildPhase: resources
    dependencies:
      - package: Firebase
        product: FirebaseCore
      - package: Firebase
        product: FirebaseAnalytics
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jacobrozell.DartsScoreboard
        PRODUCT_NAME: DartsScoreboard
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: DartsScoreboard
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UIRequiresFullScreen: NO
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0.0
    scheme:
      testTargets:
        - DartsScoreboardTests
        - DartsScoreboardUITests
  DartsScoreboardTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - target: DartsScoreboard
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
  DartsScoreboardUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: UITests
    dependencies:
      - target: DartsScoreboard
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: DartsScoreboard
