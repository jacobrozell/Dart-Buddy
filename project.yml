name: DartBuddy
attributes:
  ORGANIZATIONNAME: Jacob Rozell
packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: 11.0.0
options:
  minimumXcodeGenVersion: 2.44.0
  bundleIdPrefix: com.jacobrozell
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    SWIFT_VERSION: 5.10
    DEVELOPMENT_TEAM: 7JT2JB89AV
    CODE_SIGN_STYLE: Automatic
targets:
  DartBuddy:
    type: application
    platform: iOS
    sources:
      - path: App
      - path: Data
      - path: DesignSystem
      - path: Domain
      - path: Features
      - path: Persistence
      - path: Support
      - path: Intents
      - path: Resources/Media.xcassets
      - path: Resources/en.lproj/Localizable.strings
        type: file
        buildPhase: resources
      - path: Resources/de.lproj/Localizable.strings
        type: file
        buildPhase: resources
      - path: Resources/es.lproj/Localizable.strings
        type: file
        buildPhase: resources
      - path: Resources/nl.lproj/Localizable.strings
        type: file
        buildPhase: resources
      - path: Resources/GoogleService-Info.plist
        type: file
        buildPhase: resources
    dependencies:
      - package: Firebase
        product: FirebaseCore
      - package: Firebase
        product: FirebaseAnalytics
      - package: Firebase
        product: FirebaseCrashlytics
      - sdk: AppIntents.framework
    postBuildScripts:
      - name: Firebase Crashlytics
        script: |
          if [ "${CONFIGURATION}" != "Release" ]; then
            exit 0
          fi
          if ! [ -f "${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/GoogleService-Info.plist" ]; then
            exit 0
          fi
          if grep -q "REPLACE_WITH" "${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/GoogleService-Info.plist" 2>/dev/null; then
            exit 0
          fi
          RUN_SCRIPT="${BUILD_DIR%/Build/*}/SourcePackages/checkouts/firebase-ios-sdk/Crashlytics/run"
          if [ ! -f "$RUN_SCRIPT" ]; then
            echo "warning: Crashlytics run script not found at $RUN_SCRIPT"
            exit 0
          fi
          "$RUN_SCRIPT"
        inputFileLists:
          - Scripts/FirebaseCrashlyticsInputFiles.xcfilelist
        basedOnDependencyAnalysis: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jacobrozell.DartBuddy
        PRODUCT_NAME: DartBuddy
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Dart Buddy
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.sports
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UIRequiresFullScreen: NO
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0.0
    info:
      path: App/DartBuddy-Info.plist
      properties:
        CFBundleURLTypes:
          - CFBundleURLName: com.jacobrozell.DartBuddy.deeplink
            CFBundleURLSchemes:
              - dartbuddy
    scheme:
      testTargets:
        - DartBuddyTests
        - name: DartBuddyUITests
          parallelizable: false
  DartBuddyTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/Unit
      - path: Tests/Accessibility
      - path: Tests/TestTags.swift
    dependencies:
      - target: DartBuddy
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
  DartBuddyPerformanceTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/Performance
      - path: Tests/TestTags.swift
    dependencies:
      - target: DartBuddy
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.jacobrozell.DartBuddyPerformanceTests
  DartBuddyUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: Tests/UI
    dependencies:
      - target: DartBuddy
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: DartBuddy
schemes:
  DartBuddyCI:
    build:
      targets:
        DartBuddy: all
    test:
      gatherCoverageData: true
      coverageTargets:
        - DartBuddy
      targets:
        - DartBuddyTests
    run:
      config: Debug
